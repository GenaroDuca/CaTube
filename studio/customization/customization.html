<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="customization.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- libreria Font Awesome para iconos -->
</head>

<body>
    <header class="header">
        <div class="left-section">
            <button class="menu-btn"><i class="fas fa-bars"></i></button> <!-- i se usa como contenedor de iconos -->
            <img src="../imgs/CaTube white.svg" alt="CaTube logo" class="logo">
            <span class="title">Studio</span>
        </div>

        <div class="search-section">
            <div class="mic-section">
                <button class="mic-btn">
                    <i class="fa fa-microphone"></i></i>
                </button>
            </div>

            <div class="bar-section">
                <input type="text" placeholder="Search">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="right-section">
            <button class="create-btn">Create <i class="fas fa-plus"></i></button>

            <div class="account-section">
                <button class="notify-btn"><i class="fas fa-bell"></i></button>
                <button class="user-btn"><i class="fas fa-user"></i></button>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="left-menu">


        </div>

        <div class="content">

            <div class="top-row">

                <h1 class="dash">Channel customization</h1>
                <h1 class="subtitle">Profile</h1>
                <div class="line-color">

                </div>

                <div class="line">

                </div>

                

                

            <div class="channel">
                <div class="channel-photo">

                </div>
                <h1 class="cn"> Channel Name</h1>
            </div>

        </div>

</body>

</html>
