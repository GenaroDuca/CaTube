<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaTube</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="register.css"/>

</head>

<body>
    <!-- LOGIN PANEL -->
    <aside class="auth-panel active" id="login-panel">
        <div class="auth-box-login">
            <form class="form-section" method="POST">
                <h1>Login</h1>
                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-person"></i></div>
                    <input type="text" placeholder="Username" required id="username-login-input"/>
                </div>
                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-key"></i></div>
                    <input type="password" placeholder="Password" required id="password-login-input"/>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>

            <div class="panel-section">
                <h1>CaTube</h1>
                <p>Don't have an account?</p>
                <button type="button" class="btn outlined" id="go-to-signup">Sign Up</button>
            </div>
        </div>
    </aside>

    <!-- SIGNUP PANEL -->
    <aside class="auth-panel" id="signup-panel">
        <div class="auth-box-signup">
            <div class="panel-section">
                <h1>CaTube</h1>
                <p>Already have an account?</p>
                <button type="button" class="btn outlined" id="go-to-login">Login</button>
            </div>

            <form class="form-section" method="POST">
                <h1>Sign Up</h1>
                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-person"></i></div>
                    <input type="text" placeholder="Username" required id="username-signup-input"/>
                </div>

                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-envelope"></i></div>
                    <input type="text" placeholder="Mail" required id="mail-signup-input"/>
                </div>

                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-key"></i></div>
                    <input type="password" placeholder="Password" required id="password-signup-input" />
                </div>
                <div class="input-group">
                    <div class="icon-circle"><i class="bi bi-key"></i></div>
                    <input type="password" placeholder="Repeat Password" required id="repeat-password-signup-input"/>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
        </div>
    </aside>

    <script src="script.js"></script>
</body>

</html>
