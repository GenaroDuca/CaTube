<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaTube</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="register.css" />
    <link rel="stylesheet" href="../header/header.css">
</head>

<body>
    <header class="header">
        <!-- Menu y logo -->
        <div class="left-section">
            <!-- i se usa como contenedor de iconos -->
            <a href="../home/home.html"><img src="../media/header_media/logo/catube_white.svg" alt="CaTube logo" class="logo"></a>
            <span class="title">CaTube</span>
        </div>
    </header>

    <!-- LOGIN PANEL -->
    <aside class="auth-panel active" id="login-panel">
        <div class="auth-box-login">
            <form class="form-section" method="POST">
                <h1>Login</h1>
                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-person"></i></div>
                        <input type="text" placeholder="Username" class="input" />
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-key"></i></div>
                        <input type="password" placeholder="Password" class="input" />
                    </div>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>

            <div class="panel-section">
                <a href="../home/home.html">
                    <h1>CaTube</h1>
                </a>
                <p>Don't have an account?</p>
                <button type="button" class="btn outlined" id="go-to-signup">Sign Up</button>
            </div>
        </div>
    </aside>

    <!-- SIGNUP PANEL -->
    <aside class="auth-panel" id="signup-panel">
        <div class="auth-box-signup">
            <div class="panel-section">
                <a href="../home/home.html">
                    <h1>CaTube</h1>
                </a>
                <p>Already have an account?</p>
                <button type="button" class="btn outlined" id="go-to-login">Login</button>
            </div>

            <form class="form-section" method="POST">
                <h1>Sign Up</h1>
                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-person"></i></div>
                        <input type="text" placeholder="Username" class="input" required/>
                    </div>
                </div>
                <label for="text">Min 5 characters, max 20 characters</label>

                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-envelope"></i></div>
                        <input type="email" placeholder="Mail" class="input" required/>
                    </div>

                </div>

                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-key"></i></div>
                        <input type="password" placeholder="Password" class="input" required/>
                    </div>
                </div>
                <label for="password">Min 8 characters, incl. upper, lower, num, symbol</label>

                <div class="input-group">
                    <div class="input-row">
                        <div class="icon-circle"><i class="bi bi-key"></i></div>
                        <input type="password" placeholder="Repeat Password" class="input" required/>
                    </div>
                </div>
                <button type="submit" class="btn" id="signup-btn">Sign Up</button>
            </form>
        </div>
    </aside>

    <script src="register.js"></script>
</body>

</html>
