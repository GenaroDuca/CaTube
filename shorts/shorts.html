<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts</title>
    <link rel="icon" type="image/svg+xml" href="../media/header_media/logo/catube_white.svg" />
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Google Material Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="shorts.css">
    <link rel="stylesheet" href="/global_components/global_components.css">

</head>

<body>
    <header></header>

    <section id="leftContainer"></section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-short-principal">
            <div class="short-block">
                <div class="short-header" id="short-actions-container">
                    <div class="short-channel-avatar">
                        <img src="../media/home_media/profile/angel.jpg" alt="angel">
                    </div>
                    <div class="channel-info">
                        <p>Channel Name</p>
                        <p>description of short</p>
                    </div>
                    <a href="/register/register.html" type="button"
                        class="subscribe-button short-action-subscribe">Subscribe</a>
                    <button type="button" class="subscribe-button short-action-promote owner-action"
                        style="display: none">Promote short</button>
                    <button type="button" id="maximize" class="action-button"><img
                            src="../media/studio_media/maximize.png" alt="maxime"></button>

                </div>
                <div class="container-play-vol">
                    <button type="button" id="playPauseBtn" class="action-button btn-play"
                        data-play-src="../media/studio_media/play.png" data-pause-src="../media/studio_media/pause.png">
                        <img src="../media/studio_media/play.png" alt="play">
                    </button>
                    <div class="volume-control-container">
                        <button type="button" id="soundMuteBtn" class="action-button btn-sound"
                            data-sound-src="../media/studio_media/sound.png"
                            data-mute-src="../media/studio_media/no-sound.png">
                            <img src="../media/studio_media/sound.png" alt="sound on">
                        </button>
                        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01"
                            value="1" style="display: none;">
                    </div>
                </div>
                <div class="video-placeholder">
                    <video id=shortVideo src="../media/short_media/Funny Cars Crossing Bollard _ BeamNG.Drive.mp4"
                        autoplay muted loop></video>
                </div>

                <div class="action-buttons">
                    <button type="button" class="action-button"><img src="../media/studio_media/likes.png"
                            alt="like"></button>
                    <button type="button" class="action-button"><img src="../media/studio_media/dislikes.png"
                            alt="dislike"></button>
                    <button type="button" class="action-button"><img src="../media/studio_media/comments.png"
                            alt="comments"></button>
                    <button type="button" class="action-button"><img src="../media/studio_media/share.png"
                            alt="share"></button>
                    <button type="button" class="action-button"><img src="../media/studio_media/settings.png"
                            alt="settings"></button>
                </div>

                <div class="title-bar-short">
                    <p>title of short – title of short – title of short</p>
                </div>
                <div class="short-footer"></div>
            </div>
        </div>
    </main>

    <footer> </footer>

    <script src="/global_components/upload_components.js"></script>
    <script src="shorts.js"></script>
</body>

</html>
