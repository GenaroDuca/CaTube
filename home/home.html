<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaTube</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- libreria Font Awesome para iconos -->
</head>
<body>
    <header class="header">
        <div class="left-section">
            <button class="menu-btn"><i class="fas fa-bars"></i></button> <!-- i se usa como contenedor de iconos -->
            <img src="./IMG/CaTube White Logo.png" alt="CaTube logo" class="logo">
            <span class="title">CaTube</span>
        </div>

        <div class="search-section">
            <div class="mic-section">
                <button class="mic-btn">
                    <i class="fa fa-microphone"></i></i>
                </button>
            </div>
            
            <div class="bar-section">
                <input type="text" placeholder="Search">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="right-section">
            <button class="create-btn">Create <i class="fas fa-plus"></i></button>
            <button class="notify-btn"><i class="fas fa-bell"></i></button>
            <button class="user-btn"><i class="fas fa-user"></i></button>
        </div>
    </header>
</body>
</html>
