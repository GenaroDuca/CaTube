<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- Evitar zoom en móviles -->
    <title>Catube Flappy - Delta Time</title> <!-- Cambiado el título para reflejar la corrección -->
    <link rel="webside icon" type="img" href="/media/header_media/logo/catube_white.svg">
    <link rel="stylesheet" href="/header/header.css"> <!-- Asumo que este CSS maneja bien el header -->
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts (icons) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            /* Para que el header esté arriba y el canvas debajo */
            align-items: center;
            /* Centrar canvas horizontalmente */
            /* justify-content: center; Ya no es necesario si el header es fixed y el canvas tiene margen */
            min-height: 100vh;
            /* Asegurar que ocupe toda la altura */
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            /* Evitar barras de scroll innecesarias */
            background-color: #f0f0f0;
            /* Color de fondo para la página, opcional */
        }

        /* Estilos para el header (si /header/header.css no los define o para asegurar compatibilidad) */
        .header {
            width: 100%;
            /* background-color: #333;  Asumo que header.css lo define */
            /* color: white; */
            padding: 10px 20px;
            box-sizing: border-box;
            position: fixed;
            /* Fijar el header */
            top: 0;
            left: 0;
            z-index: 100;
            /* Asegurar que esté por encima de todo */
        }


        #gameCanvas {
            border-radius: 15px;
            /* Un poco menos para pantallas más pequeñas */
            background-color: #87CEEB;
            /* Dejar espacio para el header fijo */
            margin-top: 70px;
            /* Ajusta esto según la altura real de tu header + un pequeño margen */
            /* El tamaño se define en JS, pero podrías dar un max-width/height aquí si fuera necesario */
            display: block;
            /* Para que el margen funcione correctamente */
        }

        #startScreen,
        #gameOverScreen {
            position: fixed;
            /* Usar fixed para que se posicione relativo a la ventana */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            z-index: 110;
            /* Encima del header y canvas */
            width: 85%;
            max-width: 400px;
        }

        #startScreen h1,
        #gameOverScreen h1 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        #startScreen button,
        #gameOverScreen button {
            padding: 12px 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            /* Un poco más redondeado */
            width: 70%;
            max-width: 220px;
        }

        #startScreen button:hover,
        #gameOverScreen button:hover {
            background-color: #45a049;
        }

        #startScreen button:disabled {
            background-color: #aaa;
            cursor: default;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="left-section">
            <a href="/index.html"><img src="/media/header_media/logo/catube_white.svg" alt="CaTube logo"
                    class="logo"></a>
            <span class="title">CaTube</span>
        </div>
        <div class="right-section">
            <a href="/index.html"><button class="return-btn-soon">Return</button></a>
        </div>
    </header>


    <div id="startScreen">
        <h1>Catube Flappy</h1>
        <button id="startButton">Loading...</button>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <h1>Game Over</h1>
        <p>Points: <span id="finalScore">0</span></p>
        <p>Record: <span id="highScore">0</span></p>
        <button id="restartButton">Retry</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const finalScoreDisplay = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');

        const BIRD_IMAGE_PATH = '/media/header_media/logo/catube_white.svg';
        const birdImage = new Image();
        let birdImageLoaded = false;

        const BIRD_WIDTH = 40;
        const BIRD_HEIGHT = 30;
        const BIRD_X = 50;

        // --- FÍSICA INDEPENDIENTE DE FRAMERATE (VALORES POR SEGUNDO) ---
        // Estos valores son PUNTOS DE PARTIDA. Necesitarás AJUSTARLOS ("tunearlos")
        // para que la jugabilidad se sienta como deseas.
        const BASE_FPS_FOR_TUNING = 60; // Asumimos que tus valores originales estaban bien para 60FPS

        const ORIGINAL_GRAVITY = 0.5;          // Tu valor original
        const ORIGINAL_JUMP_STRENGTH = -8;     // Tu valor original
        const ORIGINAL_PIPE_SPEED = 3;         // Tu valor original

        // Valores por segundo (necesitarás ajustarlos)
        let GRAVITY_PER_SEC = ORIGINAL_GRAVITY * BASE_FPS_FOR_TUNING;             // ej: 0.5 * 60 = 30
        let JUMP_STRENGTH_PER_SEC = ORIGINAL_JUMP_STRENGTH * BASE_FPS_FOR_TUNING; // ej: -8 * 60 = -480
        let PIPE_SPEED_PER_SEC = ORIGINAL_PIPE_SPEED * BASE_FPS_FOR_TUNING;       // ej: 3 * 60 = 180

        // Diferenciación Móvil/Escritorio (opcional, pero recomendado)
        const MOBILE_GRAVITY_FACTOR = 0.7; // Gravedad en móvil es 70% de la de escritorio
        const MOBILE_JUMP_FACTOR = 0.9;    // Salto en móvil es 90% del de escritorio
        const MOBILE_PIPE_SPEED_FACTOR = 0.85; // Tuberías un poco más lentas en móvil


        const PIPE_WIDTH = 70;
        const PIPE_GAP_BASE = 160; // Usamos este como base
        const PIPE_COLOR = 'green';
        const PIPE_SPAWN_INTERVAL = 1600; // Un poco más de tiempo, en milisegundos

        let birdY, birdVelocityY_per_sec; // Velocidad ahora es por segundo
        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameRunning = false;
        let lastPipeSpawnTime = 0;
        let animationFrameId;
        let lastFrameTime = 0;

        function applyDeviceSpecificPhysics() {
            const isMobile = window.innerWidth < 768 || ('ontouchstart' in window);
            const desktopGravity = ORIGINAL_GRAVITY * BASE_FPS_FOR_TUNING;
            const desktopJump = ORIGINAL_JUMP_STRENGTH * BASE_FPS_FOR_TUNING;
            const desktopPipeSpeed = ORIGINAL_PIPE_SPEED * BASE_FPS_FOR_TUNING;

            if (isMobile) {
                GRAVITY_PER_SEC = desktopGravity * MOBILE_GRAVITY_FACTOR;
                JUMP_STRENGTH_PER_SEC = desktopJump * MOBILE_JUMP_FACTOR;
                PIPE_SPEED_PER_SEC = desktopPipeSpeed * MOBILE_PIPE_SPEED_FACTOR;
                console.log("Mobile physics applied (per sec)");
            } else {
                GRAVITY_PER_SEC = desktopGravity;
                JUMP_STRENGTH_PER_SEC = desktopJump;
                PIPE_SPEED_PER_SEC = desktopPipeSpeed;
                console.log("Desktop physics applied (per sec)");
            }
        }


        function resizeCanvas() {
            const header = document.querySelector('.header');
            const headerHeight = header ? header.offsetHeight : 60; // Estima 60px si el header no se encuentra aún

            // Dejar algo de espacio vertical (ej. 20px arriba y 20px abajo del canvas, además del header)
            const verticalPadding = 40;
            const availableHeight = window.innerHeight - headerHeight - verticalPadding;

            // Dejar algo de espacio horizontal (ej. 20px a cada lado)
            const horizontalPadding = 40;
            const availableWidth = window.innerWidth - horizontalPadding;

            canvas.width = Math.min(availableWidth, 500); // Max 500px de ancho
            canvas.height = Math.min(availableHeight, 600); // Max 600px de alto

            // Si el canvas es muy pequeño, podría ser un problema. Podrías añadir un tamaño mínimo.
            // canvas.width = Math.max(canvas.width, 300); 
            // canvas.height = Math.max(canvas.height, 400);

            // Re-centrar el canvas verticalmente si es necesario, aunque flex en body debería ayudar
            canvas.style.marginTop = `${headerHeight + (verticalPadding / 2)}px`;
        }


        function initGame() {
            applyDeviceSpecificPhysics(); // Aplicar física antes de iniciar

            birdY = canvas.height / 2 - BIRD_HEIGHT / 2;
            birdVelocityY_per_sec = 0;
            pipes = [];
            score = 0;
            lastPipeSpawnTime = performance.now();

            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
            gameRunning = true;

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            spawnPipe();
            lastFrameTime = performance.now(); // MUY IMPORTANTE: Inicializar antes del primer gameLoop
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function startGameScreen() {
            applyDeviceSpecificPhysics(); // Aplicar física también aquí por si se redimensiona
            resizeCanvas(); // Redimensionar primero
            startScreen.style.display = 'block';
            gameOverScreen.style.display = 'none';
            updateHighScoreDisplay();
            startButton.disabled = true;
            startButton.textContent = "Loading...";

            birdImage.onload = () => {
                birdImageLoaded = true;
                startButton.disabled = false;
                startButton.textContent = "Start Game";
                console.log("Bird image loaded.");
            };
            birdImage.onerror = () => {
                console.error(`Error loading image: ${BIRD_IMAGE_PATH}. Using fallback.`);
                birdImageLoaded = false;
                startButton.disabled = false;
                startButton.textContent = "Start (Image Error)";
            };

            // Cargar imagen solo si no se ha intentado antes o si la ruta cambió (poco probable aquí)
            if (birdImage.src !== window.location.origin + BIRD_IMAGE_PATH) {
                birdImage.src = BIRD_IMAGE_PATH;
            } else if (birdImage.complete && birdImageLoaded) { // Si ya está cargada (ej. por caché)
                birdImage.onload(); // Forzar la lógica onload para habilitar el botón
            } else if (!birdImage.src) { // Si no tiene src (primera vez)
                birdImage.src = BIRD_IMAGE_PATH;
            }
        }

        function drawBird() {
            if (birdImageLoaded && birdImage.complete && birdImage.naturalWidth > 0) {
                ctx.drawImage(birdImage, BIRD_X, birdY, BIRD_WIDTH, BIRD_HEIGHT);
            } else {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(BIRD_X, birdY, BIRD_WIDTH, BIRD_HEIGHT);
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(BIRD_X + BIRD_WIDTH * 0.7, birdY + BIRD_HEIGHT * 0.4, BIRD_WIDTH * 0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(BIRD_X + BIRD_WIDTH * 0.75, birdY + BIRD_HEIGHT * 0.4, BIRD_WIDTH * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function birdJump() {
            if (gameRunning) {
                birdVelocityY_per_sec = JUMP_STRENGTH_PER_SEC;
            }
        }

        function updateBird(deltaTime) {
            birdVelocityY_per_sec += GRAVITY_PER_SEC * deltaTime;
            birdY += birdVelocityY_per_sec * deltaTime;

            if (birdY + BIRD_HEIGHT > canvas.height || birdY < 0) {
                endGame();
            }
        }

        function spawnPipe() {
            if (!gameRunning) return;
            const isMobile = window.innerWidth < 768 || ('ontouchstart' in window);
            const MIN_MARGIN_FROM_EDGE = isMobile ? 60 : 75;
            // Hacer el hueco un poco más grande en móviles
            const currentPipeGap = isMobile ? PIPE_GAP_BASE + 15 : PIPE_GAP_BASE;


            const availableRandomRange = canvas.height - currentPipeGap - (2 * MIN_MARGIN_FROM_EDGE);
            let topPipeHeight;
            if (availableRandomRange <= 0) { // Si no hay espacio suficiente para el hueco y los márgenes
                topPipeHeight = MIN_MARGIN_FROM_EDGE; // Ponerlo lo más arriba posible respetando el margen
            } else {
                topPipeHeight = Math.random() * availableRandomRange + MIN_MARGIN_FROM_EDGE;
            }
            pipes.push({ x: canvas.width, y: 0, height: topPipeHeight, passed: false });
            pipes.push({ x: canvas.width, y: topPipeHeight + currentPipeGap, height: canvas.height - (topPipeHeight + currentPipeGap), passed: true });
        }

        function updatePipes(deltaTime) {
            for (let i = 0; i < pipes.length; i++) {
                pipes[i].x -= PIPE_SPEED_PER_SEC * deltaTime;

                if (BIRD_X < pipes[i].x + PIPE_WIDTH &&
                    BIRD_X + BIRD_WIDTH > pipes[i].x &&
                    birdY < pipes[i].y + pipes[i].height &&
                    birdY + BIRD_HEIGHT > pipes[i].y) {
                    endGame();
                    return;
                }
                if (i % 2 === 0 && !pipes[i].passed && pipes[i].x + PIPE_WIDTH < BIRD_X) {
                    pipes[i].passed = true;
                    score++;
                }
            }
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
        }

        function drawPipes() {
            ctx.fillStyle = PIPE_COLOR;
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, pipe.y, PIPE_WIDTH, pipe.height);
                ctx.fillStyle = '#558B2F'; // Verde más oscuro para el borde
                ctx.fillRect(pipe.x - 2, pipe.y, PIPE_WIDTH + 4, 10); // Borde superior de la "cabeza" de la tubería
                ctx.fillRect(pipe.x - 2, pipe.y + pipe.height - 10, PIPE_WIDTH + 4, 10); // Borde inferior
                ctx.fillStyle = PIPE_COLOR; // Restaurar color
            });
        }

        function drawScore() {
            drawText(`Points: ${score}`, 20, 30, 20, "white", "left");
        }

        function drawText(text, x, y, size, color, align = "center") {
            ctx.fillStyle = color;
            ctx.font = `bold ${size}px Arial`; // Score un poco más visible
            ctx.textAlign = align;
            ctx.fillText(text, x, y);
        }

        function updateHighScoreDisplay() {
            highScoreDisplay.textContent = highScore;
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            cancelAnimationFrame(animationFrameId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            finalScoreDisplay.textContent = score;
            updateHighScoreDisplay();
            gameOverScreen.style.display = 'block';
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;
            animationFrameId = requestAnimationFrame(gameLoop);

            const deltaTime = (currentTime - lastFrameTime) / 1000; // Delta time en segundos
            lastFrameTime = currentTime;

            // Limitar deltaTime para evitar saltos enormes si la pestaña estuvo inactiva
            const maxDeltaTime = 1 / 30; // No permitir procesar más de lo que sería 1/30s (equivale a 30fps)
            const cappedDeltaTime = Math.min(deltaTime, maxDeltaTime);

            if (currentTime - lastPipeSpawnTime > PIPE_SPAWN_INTERVAL) {
                spawnPipe();
                lastPipeSpawnTime = currentTime;
            }

            updateBird(cappedDeltaTime);
            updatePipes(cappedDeltaTime);

            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird();
            drawScore();
        }

        // --- Event Listeners ---
        startButton.addEventListener('click', () => {
            if (!startButton.disabled) initGame();
        });
        restartButton.addEventListener('click', initGame);

        function handlePlayerInput() {
            if (!gameRunning && startScreen.style.display === 'block' && !startButton.disabled) {
                initGame();
            } else if (gameRunning) {
                birdJump();
            } else if (!gameRunning && gameOverScreen.style.display === 'block') {
                initGame();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handlePlayerInput();
            }
        });

        let tapEvent = ('ontouchstart' in window) ? 'touchstart' : 'mousedown';
        canvas.addEventListener(tapEvent, (e) => {
            e.preventDefault();
            handlePlayerInput();
        });

        window.addEventListener('resize', () => {
            const wasRunning = gameRunning;
            if (wasRunning) { // Si el juego estaba corriendo, detenerlo temporalmente
                gameRunning = false;
                cancelAnimationFrame(animationFrameId);
            }
            // Siempre volver a la pantalla de inicio al redimensionar para recalcular todo
            // Esto incluye llamar a applyDeviceSpecificPhysics y resizeCanvas dentro de startGameScreen
            startGameScreen();

            // Si estaba en game over, restaurar la visualización de la pantalla de game over
            if (gameOverScreen.style.display === 'block' && !wasRunning) { // Si estaba en game over ANTES del resize
                finalScoreDisplay.textContent = score; // Restaurar el score
                updateHighScoreDisplay();
            } else if (wasRunning && gameOverScreen.style.display === 'block') { // Si terminó DURANTE el proceso de resize (raro)
                finalScoreDisplay.textContent = score;
                updateHighScoreDisplay();
            }
        });

        // Inicializar
        startGameScreen();
    </script>
    <script src="/header/header.js"></script> <!-- Asumo que este script no interfiere con el juego -->
</body>

</html>
