<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soon</title>
    <link rel="webside icon" type="img" href="/media/header_media/logo/catube_white.svg">
    <link rel="stylesheet" href="/header/header.css">
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts (icons) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            border-radius: 30px;
            background-color: #87CEEB;
        }

        #startScreen,
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }

        #startScreen button,
        #gameOverScreen button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #startScreen button:hover,
        #gameOverScreen button:hover {
            background-color: #45a049;
        }

        #startScreen button:disabled {
            background-color: #aaa;
            cursor: default;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="left-section">
            <a href="/index.html"><img src="/media/header_media/logo/catube_white.svg" alt="CaTube logo"
                    class="logo"></a>
            <span class="title">CaTube</span>
        </div>
        <div class="right-section">
            <a href="/index.html"><button class="return-btn-soon">Return</button></a>
        </div>
    </header>


    <div id="startScreen">
        <h1>Catube Flappy</h1>
        <button id="startButton">Loading...</button>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <h1>Game Over</h1>
        <p>Points: <span id="finalScore">0</span></p>
        <p>Record: <span id="highScore">0</span></p>
        <button id="restartButton">Retry</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const finalScoreDisplay = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');

        // --- NUEVO: Configuración de la imagen del pájaro ---
        const BIRD_IMAGE_PATH = '/media/header_media/logo/catube_white.svg'; // <-- ¡CAMBIA ESTO POR LA RUTA A TU IMAGEN!
        const birdImage = new Image();
        let birdImageLoaded = false;
        // ----------------------------------------------------

        const BIRD_WIDTH = 40; // Ancho deseado para dibujar la imagen
        const BIRD_HEIGHT = 30; // Alto deseado para dibujar la imagen
        const BIRD_X = 50;

        const GRAVITY = 0.5;
        const JUMP_STRENGTH = -8;

        const PIPE_WIDTH = 70;
        const PIPE_GAP = 160;
        const PIPE_COLOR = 'green';
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_INTERVAL = 1500;

        let birdY, birdVelocityY;
        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameRunning = false;
        let lastPipeSpawnTime = 0;
        let animationFrameId;
        let lastFrameTime = 0;

        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.9, 500);
            canvas.height = Math.min(window.innerHeight * 0.9, 600);
        }

        function initGame() {
            birdY = canvas.height / 2 - BIRD_HEIGHT / 2;
            birdVelocityY = 0;
            pipes = [];
            score = 0;
            lastPipeSpawnTime = performance.now();
            updateHighScoreDisplay(); // Ya se muestra en startGameScreen y gameOverScreen
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
            gameRunning = true;

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            spawnPipe();
            lastFrameTime = performance.now();
            gameLoop(lastFrameTime);
        }

        function startGameScreen() {
            resizeCanvas();
            startScreen.style.display = 'block';
            gameOverScreen.style.display = 'none';
            updateHighScoreDisplay();
            startButton.disabled = true; // Deshabilitar hasta que la imagen cargue
            startButton.textContent = "Cargando...";

            // Cargar la imagen del pájaro
            birdImage.onload = () => {
                birdImageLoaded = true;
                startButton.disabled = false;
                startButton.textContent = "Start Game";
                console.log("Imagen del pájaro cargada.");
                // Opcional: si quieres dibujar algo en el canvas de inicio una vez cargada la imagen
                // ctx.clearRect(0, 0, canvas.width, canvas.height);
                // if (birdImageLoaded) ctx.drawImage(birdImage, canvas.width/2 - BIRD_WIDTH/2, canvas.height/2 - BIRD_HEIGHT/2, BIRD_WIDTH, BIRD_HEIGHT);
            };
            birdImage.onerror = () => {
                console.error(`Error al cargar la imagen: ${BIRD_IMAGE_PATH}. Se usará el pájaro por defecto.`);
                birdImageLoaded = false; // Para que use el fallback
                startButton.disabled = false;
                startButton.textContent = "Empezar (Error Imagen)";
            };
            birdImage.src = BIRD_IMAGE_PATH;
        }

        function drawBird() {
            if (birdImageLoaded && birdImage.complete && birdImage.naturalWidth > 0) {
                // Dibuja la imagen si está cargada
                ctx.drawImage(birdImage, BIRD_X, birdY, BIRD_WIDTH, BIRD_HEIGHT);
            } else {
                // Fallback: Dibuja un rectángulo si la imagen no se cargó
                ctx.fillStyle = 'yellow'; // BIRD_COLOR ya no está definido, usamos un valor directo
                ctx.fillRect(BIRD_X, birdY, BIRD_WIDTH, BIRD_HEIGHT);
                // Ojo simple para el fallback
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(BIRD_X + BIRD_WIDTH * 0.7, birdY + BIRD_HEIGHT * 0.4, BIRD_WIDTH * 0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(BIRD_X + BIRD_WIDTH * 0.75, birdY + BIRD_HEIGHT * 0.4, BIRD_WIDTH * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function birdJump() {
            if (gameRunning) {
                birdVelocityY = JUMP_STRENGTH;
            }
        }

        function updateBird() {
            birdVelocityY += GRAVITY;
            birdY += birdVelocityY;

            if (birdY + BIRD_HEIGHT > canvas.height || birdY < 0) {
                endGame();
            }
        }

        function spawnPipe() {
            if (!gameRunning) return;
            const MIN_MARGIN_FROM_EDGE = 75;
            const availableRandomRange = canvas.height - PIPE_GAP - (2 * MIN_MARGIN_FROM_EDGE);
            let topPipeHeight;
            if (availableRandomRange <= 0) {
                topPipeHeight = MIN_MARGIN_FROM_EDGE;
            } else {
                topPipeHeight = Math.random() * availableRandomRange + MIN_MARGIN_FROM_EDGE;
            }
            pipes.push({ x: canvas.width, y: 0, height: topPipeHeight, passed: false });
            pipes.push({ x: canvas.width, y: topPipeHeight + PIPE_GAP, height: canvas.height - (topPipeHeight + PIPE_GAP), passed: true });
        }

        function updatePipes() {
            for (let i = 0; i < pipes.length; i++) {
                pipes[i].x -= PIPE_SPEED;
                if (BIRD_X < pipes[i].x + PIPE_WIDTH &&
                    BIRD_X + BIRD_WIDTH > pipes[i].x &&
                    birdY < pipes[i].y + pipes[i].height &&
                    birdY + BIRD_HEIGHT > pipes[i].y) {
                    endGame();
                    return;
                }
                if (i % 2 === 0 && !pipes[i].passed && pipes[i].x + PIPE_WIDTH < BIRD_X) {
                    pipes[i].passed = true;
                    score++;
                }
            }
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
        }

        function drawPipes() {
            ctx.fillStyle = PIPE_COLOR;
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, pipe.y, PIPE_WIDTH, pipe.height);
                ctx.fillStyle = '#558B2F';
                ctx.fillRect(pipe.x - 2, pipe.y, PIPE_WIDTH + 4, 10);
                ctx.fillRect(pipe.x - 2, pipe.y + pipe.height - 10, PIPE_WIDTH + 4, 10);
                ctx.fillStyle = PIPE_COLOR;
            });
        }

        function drawScore() {
            drawText(`Puntuación: ${score}`, 20, 30, 20, "white", "left");
        }

        function drawText(text, x, y, size, color, align = "center") {
            ctx.fillStyle = color;
            ctx.font = `${size}px Arial`;
            ctx.textAlign = align;
            ctx.fillText(text, x, y);
        }

        function updateHighScoreDisplay() {
            highScoreDisplay.textContent = highScore;
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            cancelAnimationFrame(animationFrameId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            finalScoreDisplay.textContent = score;
            updateHighScoreDisplay();
            gameOverScreen.style.display = 'block';
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;
            animationFrameId = requestAnimationFrame(gameLoop);
            lastFrameTime = currentTime;
            if (currentTime - lastPipeSpawnTime > PIPE_SPAWN_INTERVAL) {
                spawnPipe();
                lastPipeSpawnTime = currentTime;
            }
            updateBird();
            updatePipes();
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird(); // Ahora dibuja la imagen
            drawScore();
        }

        startButton.addEventListener('click', () => {
            if (!startButton.disabled) initGame();
        });
        restartButton.addEventListener('click', initGame);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display === 'block' && !startButton.disabled) {
                    initGame();
                } else if (gameRunning) {
                    birdJump();
                } else if (!gameRunning && gameOverScreen.style.display === 'block') {
                    initGame();
                }
            }
        });

        canvas.addEventListener('mousedown', () => {
            if (!gameRunning && startScreen.style.display === 'block' && !startButton.disabled) {
                initGame();
            } else if (gameRunning) {
                birdJump();
            } else if (!gameRunning && gameOverScreen.style.display === 'block') {
                initGame();
            }
        });

        window.addEventListener('resize', () => {
            const wasRunning = gameRunning;
            if (wasRunning) {
                gameRunning = false;
                cancelAnimationFrame(animationFrameId);
            }
            resizeCanvas();
            if (startScreen.style.display === 'block' || gameOverScreen.style.display === 'block') {
                if (gameOverScreen.style.display === 'block') {
                    finalScoreDisplay.textContent = score;
                    updateHighScoreDisplay();
                } else {
                    // Re-ejecutar startGameScreen para que maneje la carga de imagen y estado del botón
                    startGameScreen();
                }
            } else if (wasRunning) {
                startGameScreen(); // Volver a la pantalla de inicio, simplificado
            } else {
                startGameScreen();
            }
        });

        // Inicializar
        startGameScreen(); // Esto ahora también maneja la carga de la imagen
    </script>
    <script src="/header/header.js"></script>
</body>

</html>
